name: Push-to-EC2
on:
  push:
    branches:
      -"main"
env:
  AWS_SERVER: ${{ env.AWS_SERVER }}

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    steps:
    - name: Checkout the files
      uses: actions/checkout@v3

    - name: create file
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ env.AWS_SERVER }}
        username: "bernard"
        key: ${{ secrets.BERNARD_SSH_KEY }}
        port: "22"
        script: | 
          echo "This is a new file created by GitHub Actions" > /home/bernard/we_love_Felipe_2.txt