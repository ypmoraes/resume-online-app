# comment just to try
name: Push-to-EC2
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    steps:
    - name: Checkout the files
      uses: actions/checkout@v3

    - name: Test SSH Connection
      run: ssh -i <(echo "${{ secrets.EC2_SSH_KEY }}") ec2-user@67.202.7.141

    - name: Create a new file with SSH
      uses: easingthemes/ssh-deploy@main
      env:
        SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        REMOTE_HOST: "67.202.7.141"
        REMOTE_USER: "ec2-user"
        RUN_COMMAND: |
          echo "This is a new file created by GitHub Actions" > /home/ec2-user/newfile.txt
